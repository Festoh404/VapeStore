<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Vape Shop Nairobi</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body
    style="background-color: #1a202c; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;">

    <div style="margin-bottom: 30px; text-align: center;">
        <a href="/VapeStore/">
            <img src="https://drinksvine.co.ke/logo.webp" alt="Vape Shop Logo" style="max-width: 180px;">
        </a>
    </div>

    <main
        style="width: 100%; max-width: 450px; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">


        <h1 style="color: #1a202c; font-size: 24px; margin-bottom: 8px;">Welcome Back</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5;">Log in to your account for
            faster checkout and to track your orders.</p>

        <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label
                    style="display: block; margin-bottom: 8px; color: #1a202c; font-weight: 500; font-size: 14px;">Email
                    Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
            </div>

            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="color: #1a202c; font-weight: 500; font-size: 14px;">Password</label>
                    <a href="#" style="font-size: 13px; color: #FF0000; text-decoration: none;">Forgot password?</a>
                </div>
                <input type="password" name="password" required placeholder="••••••••"
                    style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
            </div>

            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 10px; border: none; font-size: 16px; padding: 14px;">Log In</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #666;">
            Don't have an account? <a href="signup"
                style="color: #FF0000; font-weight: bold; text-decoration: none;">Sign Up</a>
        </div>
    </main>

</body>

</html>
