<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Vape Shop Nairobi</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body
    style="background-color: #1a202c; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;">

    <div style="margin-bottom: 30px; text-align: center;">
        <a href="/VapeStore/">
            <img src="https://drinksvine.co.ke/logo.webp" alt="Vape Shop Logo" style="max-width: 180px;">
        </a>
    </div>

    <main
        style="width: 100%; max-width: 500px; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">



        <h1 style="color: #1a202c; font-size: 24px; margin-bottom: 8px;">Create an Account</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5;">Join Premium Vapes for exclusive
            deals and a seamless shopping experience.</p>

        <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 20px;">

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label
                        style="display: block; margin-bottom: 8px; color: #1a202c; font-weight: 500; font-size: 14px;">First
                        Name</label>
                    <input type="text" name="first_name" required
                        style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
                </div>
                <div style="flex: 1;">
                    <label
                        style="display: block; margin-bottom: 8px; color: #1a202c; font-weight: 500; font-size: 14px;">Last
                        Name</label>
                    <input type="text" name="last_name" required
                        style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
                </div>
            </div>

            <div>
                <label
                    style="display: block; margin-bottom: 8px; color: #1a202c; font-weight: 500; font-size: 14px;">Email
                    Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
            </div>

            <div>
                <label
                    style="display: block; margin-bottom: 8px; color: #1a202c; font-weight: 500; font-size: 14px;">Password</label>
                <input type="password" name="password" required placeholder="Create a strong password"
                    style="width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 14px; outline: none;">
            </div>

            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 10px; border: none; font-size: 16px; padding: 14px;">Create
                Account</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #666;">
            Already have an account? <a href="login"
                style="color: #FF0000; font-weight: bold; text-decoration: none;">Log In</a>
        </div>
    </main>

</body>

</html>
